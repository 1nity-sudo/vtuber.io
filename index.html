<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>pagebyjesus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .contenedor-iframe {
            position: relative;
            width: 100%;
            height: 100%;
        }
        iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
            background: white;
            transition: filter 0.4s ease;
        }
        .iframe-blur {
            filter: blur(10px) brightness(0.5);
            pointer-events: none;
        }
        .overlay-inferior {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 62px;
            background: white;
            color: #111;
            font-size: clamp(14px, 4vw, 18px);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            padding: 10px 20px;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 -2px 8px rgba(0,0,0,0.02);
            letter-spacing: 0.2px;
            line-height: 1.4;
            word-break: break-word;
            overflow-wrap: break-word;
        }
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal {
            background: #e0e5ec;
            border-radius: 50px;
            padding: 40px 30px 30px;
            width: 90%;
            max-width: 360px;
            box-shadow: 
                10px 10px 20px rgba(0, 0, 0, 0.1),
                -10px -10px 20px rgba(255, 255, 255, 0.8),
                inset 2px 2px 5px rgba(255, 255, 255, 0.5),
                inset -2px -2px 5px rgba(0, 0, 0, 0.05);
            animation: modalEntrada 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        @keyframes modalEntrada {
            0% { opacity: 0; transform: scale(0.9) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal input {
            width: 100%;
            padding: 18px 22px;
            margin-bottom: 20px;
            border: none;
            border-radius: 60px;
            background: #e0e5ec;
            box-shadow: 
                inset 5px 5px 10px rgba(0, 0, 0, 0.05),
                inset -5px -5px 10px rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            outline: none;
            color: #333;
            font-weight: 400;
            transition: all 0.2s;
        }
        .modal input:focus {
            box-shadow: 
                inset 7px 7px 12px rgba(0, 0, 0, 0.08),
                inset -7px -7px 12px rgba(255, 255, 255, 0.9);
        }
        .modal input::placeholder {
            color: #aaa;
            font-weight: 300;
            font-size: 0.95rem;
        }
        .modal button {
            width: 100%;
            padding: 18px 24px;
            border: none;
            border-radius: 60px;
            background: #e0e5ec;
            font-size: 1.2rem;
            font-weight: 600;
            color: #2c3e50;
            cursor: pointer;
            box-shadow: 
                8px 8px 16px rgba(0, 0, 0, 0.1),
                -8px -8px 16px rgba(255, 255, 255, 0.8),
                inset 1px 1px 2px rgba(255, 255, 255, 0.5),
                inset -1px -1px 2px rgba(0, 0, 0, 0.05);
            transition: all 0.1s;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }
        .modal button:hover {
            box-shadow: 
                6px 6px 12px rgba(0, 0, 0, 0.1),
                -6px -6px 12px rgba(255, 255, 255, 0.8),
                inset 1px 1px 2px rgba(255, 255, 255, 0.5),
                inset -1px -1px 2px rgba(0, 0, 0, 0.05);
        }
        .modal button:active {
            box-shadow: 
                inset 5px 5px 10px rgba(0, 0, 0, 0.1),
                inset -5px -5px 10px rgba(255, 255, 255, 0.8);
            color: #1e2b38;
        }
        .error-msg {
            color: #c44545;
            margin-top: 20px;
            font-size: 0.9rem;
            text-align: center;
            font-weight: 450;
            min-height: 24px;
        }
        .texto-hundido {
            text-align: center;
            margin-top: 25px;
            font-size: 1.1rem;
            font-weight: 500;
            color: #4a5a6a;
            text-shadow: 
                1px 1px 2px rgba(255, 255, 255, 0.8),
                -1px -1px 2px rgba(0, 0, 0, 0.1);
            letter-spacing: 0.5px;
            padding: 8px 0;
        }
        @media (max-width: 480px) {
            .modal {
                padding: 30px 20px 25px;
                border-radius: 40px;
            }
            .modal input {
                padding: 16px 20px;
                font-size: 0.95rem;
            }
            .overlay-inferior {
                height: 55px;
                font-size: 13px;
                padding: 6px 12px;
            }
            .texto-hundido {
                margin-top: 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="contenedor-iframe">
        <iframe id="miIframe" src="https://q7h7qssltxiq4.ok.kimi.link/" class="iframe-blur"></iframe>
        <div id="textoOverlay" class="overlay-inferior"></div>
    </div>

    <div id="modalBackdrop" class="modal-backdrop">
        <div class="modal">
            <input type="text" id="username" placeholder="usuario" autocomplete="off">
            <input type="password" id="password" placeholder="contraseña">
            <button id="btnLogin">entrar</button>
            <div id="errorMsg" class="error-msg"></div>
            <div class="texto-hundido">By jesuslfhdz</div>
        </div>
    </div>

    <script>
        (function() {
            async function hash(texto) {
                const encoder = new TextEncoder();
                const data = encoder.encode(texto);
                const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
            }

            let hashU, hashP;
            async function initHashes() {
                hashU = await hash('jesuslfhdz01x0');
                hashP = await hash('01x90j67');
            }
            initHashes();

            const iframe = document.getElementById('miIframe');
            const modal = document.getElementById('modalBackdrop');
            const btn = document.getElementById('btnLogin');
            const userInput = document.getElementById('username');
            const passInput = document.getElementById('password');
            const error = document.getElementById('errorMsg');
            const overlay = document.getElementById('textoOverlay');

            const textos = [
                '© Page by jesus leovel faura hernandez.',
                '© 2025 Todos los derechos reservados. jesus leovel faura hernandez.'
            ];
            let indice = 0;
            let timeoutId = null;

            function typeWriter(texto, elemento, velocidad = 40, callback) {
                let i = 0;
                elemento.textContent = '';
                function escribir() {
                    if (i < texto.length) {
                        elemento.textContent += texto.charAt(i);
                        i++;
                        setTimeout(escribir, velocidad);
                    } else {
                        if (callback) callback();
                    }
                }
                escribir();
            }

            function cambiarTexto() {
                indice = (indice + 1) % textos.length;
                typeWriter(textos[indice], overlay, 40, programarSiguiente);
            }

            function programarSiguiente() {
                if (timeoutId) clearTimeout(timeoutId);
                const segundos = Math.floor(Math.random() * (10000 - 5000 + 1)) + 5000;
                timeoutId = setTimeout(cambiarTexto, segundos);
            }

            window.addEventListener('load', () => {
                typeWriter(textos[0], overlay, 40, programarSiguiente);
            });

            btn.addEventListener('click', async (e) => {
                e.preventDefault();
                const user = userInput.value.trim();
                const pass = passInput.value.trim();
                if (!user || !pass) {
                    error.textContent = 'campos vacíos';
                    return;
                }
                const hUser = await hash(user);
                const hPass = await hash(pass);
                if (hUser === hashU && hPass === hashP) {
                    iframe.classList.remove('iframe-blur');
                    modal.style.display = 'none';
                } else {
                    error.textContent = 'incorrecto';
                }
            });

            passInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') btn.click();
            });
        })();
    </script>
</body>
</html>
